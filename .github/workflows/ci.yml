name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: mongodb://127.0.0.1:27017/spotnet_test
      MONGODB_URI: mongodb://127.0.0.1:27017/spotnet_test
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run TypeScript checks
        run: npx tsc --noEmit
      - name: Run lint
        run: npm run lint
      - name: Run tests
        run: npm test
